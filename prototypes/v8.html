<!DOCTYPE html>

<meta charset="UTF-8">

<title>Underground Hacker Den</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Press Start 2P',monospace}
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
canvas{display:block;width:100%;height:calc(100% - 36px);cursor:grab;image-rendering:pixelated;image-rendering:crisp-edges}
canvas:active{cursor:grabbing}
#bottom-bar{position:fixed;bottom:0;left:0;right:0;height:36px;background:#0d0d0d;border-top:2px solid #00ff41;display:flex;align-items:center;padding:0 12px;font-family:'Press Start 2P',monospace;font-size:10px;color:#00ff41;z-index:10}
#bottom-bar .prompt{opacity:.9}
#bottom-bar .cursor{display:inline-block;width:8px;height:14px;background:#00ff41;animation:blink 1s step-end infinite;vertical-align:middle;margin-left:2px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
#bottom-bar .status{margin-left:auto;opacity:.6;font-size:8px}
</style>
</head>

// Walkable tiles
function isWalkable(tx, ty) {
  if (tx < 0 || ty < 0 || tx >= MAP_W || ty >= MAP_H) return false;
  const t = tileMap[ty][tx];
  return t === 1 || t === 2;
}

// ── Sprite Cache ──
const spriteCache = new Map();
function getSpriteCanvas(key, data, z) {
  const ck = key + '_' + z;
  if (spriteCache.has(ck)) return spriteCache.get(ck);
  const h = data.length, w = data[0].length;
  const oc = document.createElement('canvas');
  oc.width = w * z; oc.height = h * z;
  const ox = oc.getContext('2d');
  for (let r = 0; r < h; r++) {
    for (let c = 0; c < w; c++) {
      const col = data[r][c];
      if (col && col !== '') {
        ox.fillStyle = col;
        ox.fillRect(c * z, r * z, z, z);
      }
    }
  }
  spriteCache.set(ck, oc);
  return oc;
}

function clearSpriteCache() { spriteCache.clear(); }

  const hd = shadeColor(hoodieColor, -30);

  // Face

  s[3][5]=sk;s[3][6]=sk;s[3][7]=sk;s[3][8]=sk;s[3][9]=sk;s[3][10]=sk;
  // Eyes (green glow from screens)

  s[4][5]=sk;s[4][6]=sk;s[4][7]=sk;s[4][8]=sk;s[4][9]=sk;s[4][10]=sk;
  // Neck
  s[5][7]=sk;s[5][8]=sk;

function shadeColor(hex, amt) {
  let r = parseInt(hex.slice(1,3),16)+amt;
  let g = parseInt(hex.slice(3,5),16)+amt;
  let b = parseInt(hex.slice(5,7),16)+amt;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

// ── BFS Pathfinding ──
function bfs(sx, sy, ex, ey) {
  if (sx===ex && sy===ey) return [];
  const visited = new Set();
  const queue = [{x:sx,y:sy,path:[]}];
  visited.add(sy*MAP_W+sx);
  while (queue.length > 0) {
    const cur = queue.shift();
    const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
    for (const [dx,dy] of dirs) {
      const nx = cur.x+dx, ny = cur.y+dy;
      const key = ny*MAP_W+nx;
      if (!visited.has(key) && isWalkable(nx,ny)) {
        const np = [...cur.path, {x:nx,y:ny}];
        if (nx===ex && ny===ey) return np;
        visited.add(key);
        queue.push({x:nx,y:ny,path:np});
      }
    }
  }
  return [];
}

// ── Matrix Rain Effect ──
function renderMatrixRain(ctx, ch, ox, oy, z, progress, isSpawn) {
  const sprite = ch.spriteSet.idle;
  const h = sprite.length, w = sprite[0].length;
  const colStagger = [];
  // Generate deterministic stagger per character
  for (let c = 0; c < w; c++) {
    colStagger.push(((ch.id * 7 + c * 13) % 100) / 100 * 0.3);
  }
  for (let c = 0; c < w; c++) {
    const colProg = Math.max(0, Math.min(1, (progress - colStagger[c]) / 0.7));
    const headY = Math.floor(colProg * (h + 4));
    for (let r = 0; r < h; r++) {
      const px = ox + c * z;
      const py = oy + r * z;
      const distFromHead = headY - r;
      if (distFromHead >= 0 && distFromHead < 6) {
        // Matrix rain trail
        const hash = ((ch.id * 31 + c * 17 + r * 7 + Math.floor(progress * 10)) % 10);
        if (hash < 7) {
          let color;
          if (distFromHead === 0) color = '#ccffcc';
          else if (distFromHead === 1) color = '#00ff41';
          else if (distFromHead === 2) color = '#00cc33';
          else if (distFromHead === 3) color = '#009922';
          else color = '#005510';
          ctx.fillStyle = color;
          ctx.fillRect(px, py, z, z);
        }
      }
      // Show character pixel if rain has passed
      if (isSpawn && distFromHead > 3) {
        const col = sprite[r][c];
        if (col && col !== '') {
          ctx.fillStyle = col;
          ctx.fillRect(px, py, z, z);
        }
      }
      if (!isSpawn && distFromHead < 0) {
        const col = sprite[r][c];
        if (col && col !== '') {
          ctx.fillStyle = col;
          ctx.fillRect(px, py, z, z);
        }
      }
    }
  }
}

// ── Update ──
let lastTime = 0;
const WALK_SPEED = 48; // px/sec
const WALK_FRAME_DUR = 0.15;
const TYPE_FRAME_DUR = 0.3;
const SPAWN_DUR = 0.6;

function update(dt) {
  scrollOffset += dt * 12;
  if (scrollOffset > terminalLines.length * 10) scrollOffset = 0;

  // Screen flicker
  flickerTimer += dt;
  if (!flickerActive && Math.random() < 0.003) {
    flickerActive = true;
    flickerIntensity = 0.1 + Math.random() * 0.2;
    flickerTimer = 0;
  }
  if (flickerActive && flickerTimer > 0.05 + Math.random() * 0.1) {
    flickerActive = false;
  }

  for (const ch of characters) {
    ch.animTimer += dt;

    switch (ch.state) {
      case 'spawn':
        ch.spawnProgress += dt / SPAWN_DUR;
        if (ch.spawnProgress >= 1) {
          ch.spawnProgress = 1;
          ch.state = 'type';
          ch.stateTimer = 60 + Math.random() * 120;
        }
        break;

      case 'despawn':
        ch.spawnProgress += dt / SPAWN_DUR;
        if (ch.spawnProgress >= 1) {
          ch.state = 'idle';
          ch.spawnProgress = 0;
        }
        break;

      case 'type':
        if (ch.animTimer >= TYPE_FRAME_DUR) {
          ch.animTimer = 0;
          ch.animFrame = (ch.animFrame + 1) % 2;
        }
        ch.stateTimer -= dt;
        if (ch.stateTimer <= 0) {
          // Wander
          const wx = ch.tx + Math.floor(Math.random()*7) - 3;
          const wy = ch.ty + Math.floor(Math.random()*5) - 2;
          if (isWalkable(wx, wy)) {
            const path = bfs(ch.tx, ch.ty, wx, wy);
            if (path.length > 0) {
              ch.state = 'walk';
              ch.path = path;
              ch.pathIdx = 0;
              ch.moveProgress = 0;
              ch.wanderReturn = false;
            } else {
              ch.stateTimer = 30 + Math.random() * 60;
            }
          } else {
            ch.stateTimer = 30 + Math.random() * 60;
          }
        }
        break;

      case 'idle':
        ch.stateTimer -= dt;
        if (ch.stateTimer <= 0) {
          // Return to seat
          const seat = SEATS[ch.seatIdx];
          const path = bfs(ch.tx, ch.ty, seat.seatX, seat.seatY);
          if (path.length > 0) {
            ch.state = 'walk';
            ch.path = path;
            ch.pathIdx = 0;
            ch.moveProgress = 0;
            ch.wanderReturn = true;
          } else {
            ch.state = 'type';
            ch.stateTimer = 60 + Math.random() * 120;
            ch.tx = seat.seatX;
            ch.ty = seat.seatY;
            ch.x = seat.seatX * T + T/2;
            ch.y = seat.seatY * T + T/2;
          }
        }
        break;

      case 'walk':
        if (ch.pathIdx < ch.path.length) {
          const target = ch.path[ch.pathIdx];
          const startX = ch.pathIdx === 0 ? ch.tx : ch.path[ch.pathIdx-1].x;
          const startY = ch.pathIdx === 0 ? ch.ty : ch.path[ch.pathIdx-1].y;

          ch.moveProgress += (WALK_SPEED * dt) / T;

          // Direction
          const ddx = target.x - startX;
          const ddy = target.y - startY;
          if (Math.abs(ddx) > Math.abs(ddy)) ch.dir = ddx > 0 ? 'right' : 'left';
          else ch.dir = ddy > 0 ? 'down' : 'up';

          if (ch.moveProgress >= 1) {
            ch.moveProgress = 0;
            ch.tx = target.x;
            ch.ty = target.y;
            ch.x = target.x * T + T/2;
            ch.y = target.y * T + T/2;
            ch.pathIdx++;
          } else {
            ch.x = (startX + (target.x - startX) * ch.moveProgress) * T + T/2;
            ch.y = (startY + (target.y - startY) * ch.moveProgress) * T + T/2;
          }

          // Walk animation
          if (ch.animTimer >= WALK_FRAME_DUR) {
            ch.animTimer = 0;
            ch.animFrame = (ch.animFrame + 1) % 4;
          }
        } else {
          // Path complete
          if (ch.wanderReturn) {
            ch.state = 'type';
            ch.dir = 'up';
            ch.stateTimer = 60 + Math.random() * 120;
          } else {
            ch.state = 'idle';
            ch.stateTimer = 3 + Math.random() * 5;
          }
          ch.animFrame = 0;
        }
        break;
    }

    ch.zY = ch.y + T/2 + 0.5;
  }
}

// ── Render ──
function render() {
  const dpr = window.devicePixelRatio || 1;
  const cw = canvas.clientWidth;
  const ch = canvas.clientHeight;
  canvas.width = cw * dpr;
  canvas.height = ch * dpr;

  ctx.imageSmoothingEnabled = false;

  const mapPxW = MAP_W * T * zoom;
  const mapPxH = MAP_H * T * zoom;
  const offsetX = Math.floor((cw * dpr - mapPxW) / 2 + panX * dpr);
  const offsetY = Math.floor((ch * dpr - mapPxH) / 2 + panY * dpr);

  // Clear
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // ── Draw Tiles ──
  for (let ty = 0; ty < MAP_H; ty++) {
    for (let tx = 0; tx < MAP_W; tx++) {
      const tile = tileMap[ty][tx];
      const px = offsetX + tx * T * zoom;
      const py = offsetY + ty * T * zoom;
      const sz = T * zoom;

      if (tile === 3) {
        ctx.fillStyle = C_WALL;
        ctx.fillRect(px, py, sz, sz);
        // Wall detail — subtle line
        if (ty === 0 || ty === MAP_H - 1) {
          ctx.fillStyle = '#0a0a0a';
          ctx.fillRect(px, py + sz - zoom, sz, zoom);
        }
        if (tx === 0 || tx === MAP_W - 1) {
          ctx.fillStyle = '#0a0a0a';
          ctx.fillRect(px + sz - zoom, py, zoom, sz);
        }
      } else if (tile === 1) {
        ctx.fillStyle = C_FLOOR1;
        ctx.fillRect(px, py, sz, sz);
        // Concrete texture
        ctx.fillStyle = '#1d1d1d';
        ctx.fillRect(px + zoom * 3, py + zoom * 7, zoom, zoom);
        ctx.fillRect(px + zoom * 11, py + zoom * 2, zoom, zoom);
      } else if (tile === 2) {
        ctx.fillStyle = C_FLOOR2;
        ctx.fillRect(px, py, sz, sz);
        ctx.fillStyle = '#1e1e1e';
        ctx.fillRect(px + zoom * 5, py + zoom * 9, zoom, zoom);
      }
      // Tile grid lines
      if (tile === 1 || tile === 2) {
        ctx.fillStyle = '#141414';
        ctx.fillRect(px, py, sz, zoom * 0.5);
        ctx.fillRect(px, py, zoom * 0.5, sz);
      }
    }
  }

  // ── Divider wall in middle ──
  // The wall at x=10 between rooms (rows 1-3 and 11-12)
  for (let ty = 1; ty <= 3; ty++) {
    const px = offsetX + 10 * T * zoom;
    const py = offsetY + ty * T * zoom;
    ctx.fillStyle = C_WALL;
    ctx.fillRect(px, py, T * zoom, T * zoom);
  }
  for (let ty = 11; ty <= 12; ty++) {
    const px = offsetX + 10 * T * zoom;
    const py = offsetY + ty * T * zoom;
    ctx.fillStyle = C_WALL;
    ctx.fillRect(px, py, T * zoom, T * zoom);
  }

  // ── Collect all drawables ──
  const drawables = [];

  // Furniture
  for (const f of furniture) {
    drawables.push({
      type: 'furniture',
      data: f,
      zY: f.zY,
    });
  }

  // Characters
  for (const c of characters) {
    drawables.push({
      type: 'character',
      data: c,
      zY: c.zY,
    });
  }

  // Sort by zY
  drawables.sort((a, b) => a.zY - b.zY);

  // ── Draw all ──
  const now = performance.now() / 1000;
  for (const d of drawables) {
    if (d.type === 'furniture') {
      const f = d.data;
      const px = offsetX + f.x * T * zoom + (f.offsetX || 0) * zoom;
      const py = offsetY + f.y * T * zoom + (f.offsetY || 0) * zoom;

      // Screen flicker for monitors
      if (f.type === 'monitor' && flickerActive) {
        // Draw slightly offset/brightened
        const sc = getSpriteCanvas('monitor_flicker_' + f.x + '_' + f.y, f.sprite, zoom);
        ctx.globalAlpha = 1 - flickerIntensity;
        ctx.drawImage(sc, px, py);
        ctx.globalAlpha = flickerIntensity;
        ctx.drawImage(sc, px + zoom, py);
        ctx.globalAlpha = 1;
      } else {
        const key = f.type + '_' + f.x + '_' + f.y;
        const sc = getSpriteCanvas(key, f.sprite, zoom);
        ctx.drawImage(sc, px, py);
      }

      // Scrolling green text on monitors
      if (f.type === 'monitor') {
        const screenX = px + 3 * zoom;
        const screenY = py + 1 * zoom;
        const screenW = 10 * zoom;
        const screenH = 10 * zoom;

        ctx.save();
        ctx.beginPath();
        ctx.rect(screenX, screenY, screenW, screenH);
        ctx.clip();

        const lineH = 2 * zoom;
        const baseY = screenY - (scrollOffset * zoom) % (terminalLines.length * lineH);
        ctx.font = `${Math.max(zoom, 1)}px monospace`;

        for (let i = 0; i < terminalLines.length * 2; i++) {
          const li = i % terminalLines.length;
          const ly = baseY + i * lineH;
          if (ly > screenY - lineH && ly < screenY + screenH) {
            const brightness = Math.sin(now * 2 + i * 0.5) * 0.3 + 0.7;
            const g = Math.floor(brightness * 255);
            ctx.fillStyle = `rgb(0,${g},${Math.floor(g * 0.25)})`;
            // Draw pixel text representation
            const line = terminalLines[li];
            for (let ci = 0; ci < Math.min(line.length, 10); ci++) {
              if (line[ci] !== ' ') {
                ctx.fillRect(screenX + ci * zoom, ly, zoom * 0.8, zoom * 0.8);
              }
            }
          }
        }
        ctx.restore();

        // CRT scanline effect
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        for (let sy = screenY; sy < screenY + screenH; sy += zoom * 2) {
          ctx.fillRect(screenX, sy, screenW, zoom * 0.5);
        }

        // Screen glow
        ctx.fillStyle = 'rgba(0,255,65,0.03)';
        ctx.fillRect(screenX - zoom, screenY - zoom, screenW + zoom*2, screenH + zoom*2);
      }
    } else if (d.type === 'character') {
      const c = d.data;
      const spriteH = 24;
      const spriteW = 16;
      const px = offsetX + Math.floor(c.x * zoom) - (spriteW/2) * zoom;
      const py = offsetY + Math.floor(c.y * zoom) - (spriteH - T/2) * zoom;

      if (c.state === 'spawn') {
        renderMatrixRain(ctx, c, px, py, zoom, c.spawnProgress, true);
      } else if (c.state === 'despawn') {
        renderMatrixRain(ctx, c, px, py, zoom, c.spawnProgress, false);
      } else {
        let sprite;
        if (c.state === 'walk') {
          sprite = c.spriteSet.walk[c.animFrame % 4];
        } else if (c.state === 'type') {
          sprite = c.spriteSet.type[c.animFrame % 2];
        } else {
          sprite = c.spriteSet.idle;
        }
        const key = 'char_' + c.id + '_' + c.state + '_' + c.animFrame;
        const sc = getSpriteCanvas(key, sprite, zoom);
        ctx.drawImage(sc, px, py);
      }

      // Name label
      const labelY = py - 6 * zoom;
      const labelX = px + (spriteW/2) * zoom;
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      const nameW = c.name.length * 4 * zoom + 4 * zoom;
      ctx.fillRect(labelX - nameW/2, labelY - 4*zoom, nameW, 6*zoom);

      // Status dot
      const dotColor = c.state === 'type' ? C_GREEN : (c.state === 'walk' ? '#FFCB00' : '#555');
      ctx.fillStyle = dotColor;
      ctx.fillRect(labelX - nameW/2 + zoom, labelY - 3*zoom, 2*zoom, 2*zoom);

      // Name text (pixel-style)
      ctx.fillStyle = C_GREEN;
      const fontSize = Math.max(zoom * 3, 6);
      ctx.font = `${fontSize}px "Press Start 2P", monospace`;
      ctx.textAlign = 'center';
      ctx.fillText(c.name, labelX, labelY);
      ctx.textAlign = 'start';
    }
  }

  // ── Ambient green glow from monitors ──
  ctx.fillStyle = 'rgba(0,255,65,0.02)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // ── CRT overlay scanlines (subtle) ──
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  for (let sy = 0; sy < canvas.height; sy += 4) {
    ctx.fillRect(0, sy, canvas.width, 1);
  }

  // ── Vignette ──
  const grd = ctx.createRadialGradient(
    canvas.width/2, canvas.height/2, canvas.width * 0.3,
    canvas.width/2, canvas.height/2, canvas.width * 0.7
  );
  grd.addColorStop(0, 'rgba(0,0,0,0)');
  grd.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// ── Game Loop ──
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
  lastTime = timestamp;
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

// ── Input Handling ──
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const oldZoom = zoom;
  if (e.deltaY < 0) zoom = Math.min(zoom + 1, 10);
  else zoom = Math.max(zoom - 1, 1);
  if (zoom !== oldZoom) {
    clearSpriteCache();
    // Adjust pan to zoom towards mouse
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    panX = mx - (mx - panX) * (zoom / oldZoom);
    panY = my - (my - panY) * (zoom / oldZoom);
  }
}, {passive: false});

canvas.addEventListener('mousedown', (e) => {
  if (e.button === 1 || e.button === 0) {
    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    panStartX = panX;
    panStartY = panY;
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (isDragging) {
    panX = panStartX + (e.clientX - dragStartX);
    panY = panStartY + (e.clientY - dragStartY);
  }
});

canvas.addEventListener('mouseup', () => { isDragging = false; });
canvas.addEventListener('mouseleave', () => { isDragging = false; });

// Touch support
canvas.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  isDragging = true;
  dragStartX = t.clientX;
  dragStartY = t.clientY;
  panStartX = panX;
  panStartY = panY;
}, {passive: true});

canvas.addEventListener('touchmove', (e) => {
  if (isDragging && e.touches.length === 1) {
    const t = e.touches[0];
    panX = panStartX + (t.clientX - dragStartX);
    panY = panStartY + (t.clientY - dragStartY);
  }
}, {passive: true});

canvas.addEventListener('touchend', () => { isDragging = false; });

// Handle resize
window.addEventListener('resize', () => { clearSpriteCache(); });

// ── Trigger initial spawns with matrix effect ──
function initSpawns() {
  characters.forEach((ch, i) => {
    ch.state = 'spawn';
    ch.spawnProgress = -i * 0.3; // stagger
  });
}

// ── Bottom bar terminal animation ──
const statusEl = document.querySelector('#bottom-bar .status');
const statusTexts = [
  'NODES:6 | UPLINK:OK | TOR:ACTIVE',
  'NODES:6 | UPLINK:OK | PROXY:SOCKS5',
  'NODES:7 | UPLINK:OK | VPN:WIREGUARD',
  'NODES:6 | UPLINK:!! | TOR:ACTIVE',
  'NODES:6 | UPLINK:OK | TUNNEL:SSH',
];
let statusIdx = 0;
setInterval(() => {
  statusIdx = (statusIdx + 1) % statusTexts.length;
  statusEl.textContent = statusTexts[statusIdx];
}, 4000);

// ── Start ──
initSpawns();
requestAnimationFrame(gameLoop);

</script>
</body>
</html>
